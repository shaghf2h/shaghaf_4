<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هلو سوسو</title>
<style>
  :root{
    --cream:#fff6ef;
    --blush:#ffd9e3;
    --rose:#ff8fa3;
    --deep-rose:#e85d75;
    --plum:#5c3d52;
    --gold:#f4c97a;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    font-family:"Tahoma","Segoe UI",sans-serif;
  }

  body{
    background:
      radial-gradient(circle at 15% 20%, var(--blush) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, #ffe0c2 0%, transparent 45%),
      var(--cream);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* floating hearts background */
  .heart{
    position:absolute;
    bottom:-10%;
    font-size:22px;
    color:var(--rose);
    opacity:0.45;
    animation:float linear infinite;
    pointer-events:none;
    user-select:none;
  }
  @keyframes float{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.5; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-110vh) rotate(25deg); opacity:0; }
  }

  .card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(6px);
    border-radius:28px;
    padding:48px 36px;
    max-width:480px;
    width:90%;
    text-align:center;
    box-shadow:0 20px 60px rgba(232,93,117,0.18), 0 2px 8px rgba(0,0,0,0.04);
    border:1px solid rgba(255,255,255,0.6);
  }

  .stage{
    display:none;
    animation:appear .55s ease forwards;
  }
  .stage.active{ display:block; }

  @keyframes appear{
    from{ opacity:0; transform:translateY(14px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  h1{
    font-size:2.1rem;
    color:var(--plum);
    margin-bottom:10px;
    letter-spacing:.5px;
  }

  .emoji-row{
    font-size:1.6rem;
    margin-bottom:22px;
  }

  p.msg{
    font-size:1.25rem;
    color:var(--plum);
    line-height:1.9;
    margin-bottom:28px;
  }

  button.cute-btn{
    font-family:inherit;
    font-size:1.05rem;
    font-weight:bold;
    color:#fff;
    background:linear-gradient(135deg, var(--rose), var(--deep-rose));
    border:none;
    padding:15px 34px;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(232,93,117,0.35);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  button.cute-btn:hover{
    transform:translateY(-3px) scale(1.04);
    box-shadow:0 14px 30px rgba(232,93,117,0.45);
  }
  button.cute-btn:active{
    transform:translateY(0) scale(0.98);
  }

  .video-wrap{
    margin-top:6px;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,0.18);
    background:#000;
  }
  video{
    width:100%;
    display:block;
    border-radius:18px;
  }

  .hint{
    margin-top:16px;
    font-size:.82rem;
    color:#a98a98;
  }

  .dots{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:30px;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:#f1c9d2;
    transition:background .3s ease, transform .3s ease;
  }
  .dot.on{
    background:var(--deep-rose);
    transform:scale(1.3);
  }
</style>
</head>
<body>

<div class="card">

  <!-- المرحلة الأولى -->
  <div class="stage active" id="stage1">
    <div class="emoji-row">💌✨</div>
    <h1>هلو سوسو</h1>
    <button class="cute-btn" onclick="goTo(2)">هلاوو</button>
  </div>

  <!-- المرحلة الثانية -->
  <div class="stage" id="stage2">
    <div class="emoji-row">😳💭</div>
    <p class="msg">اريد اعبر الج بشي...</p>
    <button class="cute-btn" onclick="goTo(3)">شلون يعني؟</button>
  </div>

  <!-- المرحلة الثالثة -->
  <div class="stage" id="stage3">
    <div class="emoji-row">🙈💗</div>
    <p class="msg">معليج انتي... خليها علي جاهزة؟</p>
    <button class="cute-btn" onclick="goTo(4)">ايييي الله يستر</button>
  </div>

  <!-- المرحلة الرابعة: الفيديو -->
  <div class="stage" id="stage4">
    <div class="emoji-row">🎬💞</div>
    <div class="video-wrap">
      <video controls autoplay playsinline>
        <source src="1234.mp4" type="video/mp4">
        المتصفح ماكو يدعم تشغيل الفيديو.
      </video>
    </div>
    <p class="hint">حط ملف الفيديو نفس اسم "video.mp4" بنفس مجلد الصفحة عشان يشتغل 🎥</p>
  </div>

  <div class="dots">
    <div class="dot on" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
    <div class="dot" id="dot4"></div>
  </div>

</div>

<script>
  function goTo(n){
    for(let i=1;i<=4;i++){
      document.getElementById('stage'+i).classList.remove('active');
      document.getElementById('dot'+i).classList.remove('on');
    }
    document.getElementById('stage'+n).classList.add('active');
    document.getElementById('dot'+n).classList.add('on');
  }

  // قلوب تطفو بالخلفية
  const heartsChars = ['💗','💕','💖','💓','✨'];
  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartsChars[Math.floor(Math.random()*heartsChars.length)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = (8 + Math.random()*6) + 's';
    h.style.fontSize = (16 + Math.random()*16) + 'px';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(), 16000);
  }
  setInterval(spawnHeart, 900);
  for(let i=0;i<6;i++) setTimeout(spawnHeart, i*300);
</script>

</body>
</html>
